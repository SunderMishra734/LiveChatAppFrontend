<main class="home-cont-cls">
    <aside class="side-bar-cont-cls">
        <header>
            <div class="lg-logo-cls">
                <div class="logo-cls">
                    <span></span>
                </div>
            </div>
        </header>
        <nav>
            <ul>
                <li routerLinkActive="active-nav-cls">
                    <a routerLink="chat"><i class='fa fa-comments-o common-icon-cls'></i></a>
                </li>
                <li routerLinkActive="active-nav-cls">
                    <a routerLink="profile"><i class="fa fa-user common-icon-cls"></i></a>
                </li>
                <li routerLinkActive="active-nav-cls">
                    <a routerLink="setting"><i class="fa fa-cog common-icon-cls"></i></a>
                </li>
            </ul>
            <ul>
                <li>
                    <a (click)="logOutFn()"><i class="fa fa-sign-out common-icon-cls" (click)="logOutFn()"></i></a>
                </li>
            </ul>
        </nav>
    </aside>
    <div class="main-cont-cls">
        <section class="header-sec-cls">
            <header>
                @if(isSearchVisible) {
                <div class="search-cont-cls">
                    <i class="fa fa-search common-icon-cls"
                        style="font-size: 16px;line-height: 33px; height: 33px; width: 33px;"></i>
                    <input type="search" placeholder="search" style="font-size: 16px;outline: none;"
                        [(ngModel)]="searchQuery" (ngModelChange)="onSearchChange($event)">
                </div>
                }
                <div style="display: flex;align-items: center;gap: 5px;"
                    [style.margin-left]="!isSearchVisible ? 'auto' : '0'">
                    <i class="fa fa-bell-o nf-icon-cls"></i>
                    <div style="position: relative;" #userProfileContainer>
                        <div class="header-user-trigger" (click)="userProfileFn()">
                            @if(profilePic){
                            <img [src]="profilePic" alt="Profile" class="user-icon-cls" />
                            }
                            @else {
                            <i class="fa fa-user user-icon-cls"></i>
                            }
                            <div class="header-user-name">{{userFullName}}</div>
                            <i class="fa fa-caret-down" style="color: #667781; font-size: 14px; margin-left: 4px;"></i>
                        </div>
                        @if(isUserProfileVisible){
                        <section class="profile-section-cls">
                            <div class="profile-popup-header">
                                <div class="profile-popup-avatar">
                                    @if(profilePic){
                                    <img [src]="profilePic" alt="Profile" class="popup-img-cls" />
                                    }
                                    @else {
                                    <i class="fa fa-user popup-user-icon-cls"></i>
                                    }
                                </div>
                                <div class="profile-popup-info">
                                    <div class="profile-popup-name">{{userFullName}}</div>
                                    <div class="profile-popup-email">{{userEmail}}</div>
                                </div>
                            </div>
                            <div class="profile-popup-actions">
                                <button class="view-prof-btn-cls" (click)="showProfileFn()">
                                    <i class="fa fa-user-circle-o" style="margin-right: 8px;"></i> View Profile
                                </button>
                            </div>
                        </section>
                        }
                    </div>
                </div>
            </header>
        </section>
        <section class="main-section-cls">
            <main>
                <router-outlet></router-outlet>
            </main>
        </section>
    </div>
</main>
