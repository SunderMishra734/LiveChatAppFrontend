<div class="class-main-cont-cls">
    <div class="profile-actions-wrapper">
        @if(isSaveBtnVisible) {
        <button class="profile-btn btn-primary" [ngClass]="{'btn-disabled':!isEdited}" (click)="saveFn()" [disabled]="!isEdited">
            <i class="fa fa-check" style="margin-right: 8px;"></i> Save
        </button>
        <button class="profile-btn btn-secondary" (click)="cancelFn()">
            Cancel
        </button>
        }
        @else {
        <button class="profile-btn btn-primary" (click)="editFn()">
            <i class="fa fa-pencil" style="margin-right: 8px;"></i> Edit Profile
        </button>
        }
    </div>

    <form [formGroup]="profileForm">
        <!-- Profile Header Card -->
        <div class="profile-header-card">
            <div class="profile-info-row">
                <div class="pr-image-wrapper">
                    <div [ngClass]="isDisable ? 'disable-profile-cls' : 'enable-profile-cls'">
                        <label style="cursor:inherit;">
                            <input type="file" #fileInput class="file-input-cls" (change)="onFileSelected($event)" [disabled]="isDisable" hidden>
                            @if(userDetails?.profilePic){
                            <img [src]="userDetails?.profilePic" alt="Profile" class="pr-image-cls" />
                            }
                            @else {
                            <i class="fa fa-user pr-image-cls"></i>
                            }
                        </label>
                    </div>
                </div>
                <div class="name-email-cls">
                    <div class="pr-name-cls">{{userFullName || 'User Name'}}</div>
                    <div class="pr-email-cls">{{userEmail || 'email@example.com'}}</div>
                </div>
            </div>

            @if(!isDisable){
            <div class="profile-pic-actions">
                <button type="button" class="profile-btn btn-secondary" (click)="changeProfilePic()">
                    <i class="fa fa-camera" style="margin-right: 8px;"></i> {{ userDetails?.profilePic ? 'Change Picture' : 'Add Picture' }}
                </button>
                @if(userDetails?.profilePic){
                <button type="button" class="profile-btn btn-danger" (click)="deleteProfilePic()">
                    <i class="fa fa-trash-o" style="margin-right: 8px;"></i> Remove
                </button>
                }
            </div>
            }
        </div>

        <!-- Personal Details Form Card -->
        <div class="profile-details-card">
            <div class="profile-section-title">Personal Details</div>
            
            <div class="profile-form-grid">
                <div class="profile-form-group">
                    <label class="profile-label">Name</label>
                    <input type="text" class="profile-input" formControlName="fullName" [attr.disabled]="isDisable ? '' : null">
                </div>
                <div class="profile-form-group">
                    <label class="profile-label">Email</label>
                    <input type="email" class="profile-input" formControlName="email" [attr.disabled]="isDisable ? '' : null">
                </div>
                <div class="profile-form-group">
                    <label class="profile-label">Date of Birth</label>
                    <input type="date" class="profile-input" formControlName="dateOfBirth" [attr.disabled]="isDisable ? '' : null">
                </div>
                <div class="profile-form-group">
                    <label class="profile-label">Contact No</label>
                    <input type="tel" class="profile-input" formControlName="phoneNumber" [attr.disabled]="isDisable ? '' : null">
                </div>
                <div class="profile-form-group">
                    <label class="profile-label">Gender</label>
                    <select class="profile-input" formControlName="gender" [attr.disabled]="isDisable ? '' : null">
                        <option *ngFor="let gender of genders" [value]="gender.value">{{ gender.key }}</option>
                    </select>
                </div>
                <div class="profile-form-group">
                    <label class="profile-label">Profile Status</label>
                    <input type="text" class="profile-input" formControlName="profileStatus" [attr.disabled]="isDisable ? '' : null">
                </div>
                <div class="profile-form-group">
                    <label class="profile-label">Timezone</label>
                    <input type="text" class="profile-input" formControlName="timeZone" [attr.disabled]="isDisable ? '' : null">
                </div>
                <div class="profile-form-group">
                    <label class="profile-label">Language</label>
                    <select class="profile-input" formControlName="languagePreference" [attr.disabled]="isDisable ? '' : null">
                        <option *ngFor="let l of language" [value]="l.value">{{ l.key }}</option>
                    </select>
                </div>
                <div class="profile-form-group full-width">
                    <label class="profile-label">Address</label>
                    <input type="text" class="profile-input" formControlName="address" [attr.disabled]="isDisable ? '' : null">
                </div>
            </div>
        </div>
    </form>
</div>

@if (isTaosterVisible) {
<app-toaster-message [actionType]="actionType" [mainMssg]="mainMssg"
    [descriptionMssg]="descriptionMssg"></app-toaster-message>
}
